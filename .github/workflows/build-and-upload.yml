name: Build and Upload to App Store Connect

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    # CRITICAL: project.yml lives in iOS/, not the repo root. Every xcodegen/xcodebuild step
    # below relies on this job-level working directory rather than repeating it per step.
    defaults:
      run:
        working-directory: iOS
    steps:
      - uses: actions/checkout@v4

      - name: Select newest available Xcode
        run: |
          ls -1 /Applications | grep -i xcode
          LATEST=$(ls -d /Applications/Xcode*.app | sort -V | tail -1)
          echo "Selecting $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version
          xcodebuild -showsdks | grep -i ios || true

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')

      - name: Install provisioning profile
        env:
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISION_PROFILE_BASE64" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/whoseturn_appstore.mobileprovision

      - name: Archive
        run: |
          xcodebuild archive \
            -project Whoseturn.xcodeproj \
            -scheme Whoseturn \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Whoseturn.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="whoseturn appstore" \
            DEVELOPMENT_TEAM=W7Q885Q59C

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/export.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>method</key><string>app-store-connect</string>
          <key>teamID</key><string>W7Q885Q59C</string>
          <key>signingStyle</key><string>manual</string>
          <key>signingCertificate</key><string>Apple Distribution</string>
          <key>provisioningProfiles</key><dict><key>com.shimondeitel.whoseturn</key><string>whoseturn appstore</string></dict>
          <key>destination</key><string>export</string>
          <key>uploadSymbols</key><true/>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Whoseturn.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/export.plist"

      - name: Upload to App Store Connect
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > ~/private_keys/AuthKey_$ASC_KEY_ID.p8
          xcrun altool --upload-app \
            -f "$RUNNER_TEMP/export/Whoseturn.ipa" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
