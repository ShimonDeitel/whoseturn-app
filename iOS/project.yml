name: Whoseturn
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Whoseturn:
    type: application
    platform: iOS
    sources:
      - path: Whoseturn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.whoseturn
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Whoseturn/Info.plist
        CODE_SIGN_ENTITLEMENTS: Whoseturn/Whoseturn.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  WhoseturnTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WhoseturnTests
    dependencies:
      - target: Whoseturn
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.whoseturn.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Whoseturn:
    build:
      targets:
        Whoseturn: all
        WhoseturnTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - WhoseturnTests
    archive:
      config: Release
